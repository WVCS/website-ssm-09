<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 10px;
        }

        #score-container {
            font-size: 24px;
            margin-bottom: 20px;
        }

        #game-board {
            border: 4px solid #fff;
            background-color: #111;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .instructions {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>SNAKE</h1>
    <div id="score-container">Score: <span id="score">0</span></div>
    <canvas id="game-board" width="400" height="400"></canvas>
    <div class="instructions">Use Arrow Keys or WASD to move. Press Space to restart if you lose.</div>

    <script>
        const canvas = document.getElementById("game-board");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // Grid and game variables
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = gridSize; // Horizontal velocity
        let dy = 0;        // Vertical velocity
        let score = 0;
        let gameInterval;
        let gameOver = false;
        let changingDirection = false; // Prevents rapid double-taps causing self-collision

        // Start the game
        resetGame();

        // Main game loop
        function main() {
            if (hasGameEnded()) {
                gameOver = true;
                ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "red";
                ctx.font = "30px 'Courier New'";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
                
                ctx.fillStyle = "white";
                ctx.font = "16px 'Courier New'";
                ctx.fillText("Press SPACE to Restart", canvas.width / 2, canvas.height / 2 + 40);
                clearInterval(gameInterval);
                return;
            }

            changingDirection = false;
            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        // Clear the canvas every frame
        function clearCanvas() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Draw the snake
        function drawSnake() {
            snake.forEach((part, index) => {
                // Head is brighter green, body is standard green
                ctx.fillStyle = index === 0 ? "#00ff00" : "#00aa00";
                ctx.strokeStyle = "#111"; // Inner border to separate segments
                ctx.fillRect(part.x, part.y, gridSize, gridSize);
                ctx.strokeRect(part.x, part.y, gridSize, gridSize);
            });
        }

        // Move the snake forward
        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // Check if snake ate the food
            const hasEatenFood = snake[0].x === food.x && snake[0].y === food.y;
            if (hasEatenFood) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                snake.pop(); // Remove tail if it didn't eat food
            }
        }

        // Draw food on canvas
        function drawFood() {
            ctx.fillStyle = "#ff0055";
            ctx.fillRect(food.x, food.y, gridSize, gridSize);
        }

        // Generate random position for food
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount) * gridSize;
            food.y = Math.floor(Math.random() * tileCount) * gridSize;

            // Ensure food doesn't spawn on top of the snake
            snake.forEach(part => {
                const hasEaten = part.x === food.x && part.y === food.y;
                if (hasEaten) generateFood();
            });
        }

        // Collision detection
        function hasGameEnded() {
            // Self collision
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            // Wall collision
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= canvas.width;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= canvas.height;

            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        // Handle keyboard inputs
        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            const keyPressed = event.keyCode;
            
            // Arrow keys & WASD keys
            const LEFT = 37,  A = 65;
            const UP = 38,    W = 87;
            const RIGHT = 39, D = 68;
            const DOWN = 40,  S = 83;
            const SPACE = 32;

            if (keyPressed === SPACE && gameOver) {
                resetGame();
                return;
            }

            if (changingDirection) return;

            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if ((keyPressed === LEFT || keyPressed === A) && !goingRight) {
                dx = -gridSize;
                dy = 0;
                changingDirection = true;
            }
            if ((keyPressed === UP || keyPressed === W) && !goingDown) {
                dx = 0;
                dy = -gridSize;
                changingDirection = true;
            }
            if ((keyPressed === RIGHT || keyPressed === D) && !goingLeft) {
                dx = gridSize;
                dy = 0;
                changingDirection = true;
            }
            if ((keyPressed === DOWN || keyPressed === S) && !goingUp) {
                dx = 0;
                dy = gridSize;
                changingDirection = true;
            }
        }

        // Reset game state
        function resetGame() {
            snake = [
                { x: 160, y: 200 },
                { x: 140, y: 200 },
                { x: 120, y: 200 }
            ];
            score = 0;
            dx = gridSize;
            dy = 0;
            gameOver = false;
            scoreElement.innerText = score;
            generateFood();
            clearInterval(gameInterval);
            gameInterval = setInterval(main, 100); // Game speed (100ms per frame)
        }
    </script>
</body>
</html>
